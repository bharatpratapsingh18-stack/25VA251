<!DOCTYPE html>
<html>
<head>
    <title>Countdown Timer</title>
    <style>
        body{
            margin:0;
            height:100vh;
            background: linear-gradient(135deg, #4facfe, #00f2fe);
            font-family: Arial, sans-serif;
            text-align:center;
            color:white;
            display:flex;
            flex-direction:column;
            justify-content:center;
            align-items:center;
        }

        input, button{
            padding:10px;
            font-size:16px;
            margin:5px;
            border:none;
            border-radius:5px;
        }

        button{
            background:#fff;
            cursor:pointer;
        }

        #result{
            margin-top:20px;
            font-size:32px;
            font-weight:bold;
        }
    </style>
</head>
<body>

    <h1>Countdown Timer</h1>

    <input type="number" id="num" placeholder="Enter Number">
    <button onclick="startCountdown()">Start Countdown</button>

    <div id="result">Ready...</div>

    <script>
        function startCountdown() {
            let number = parseInt(document.getElementById("num").value);
            let result = document.getElementById("result");

            if (isNaN(number) || number < 0) {
                result.innerHTML = "Enter a valid number";
                return;
            }

            let timer = setInterval(function () {
                result.innerHTML = number;

                if (number <= 0) {
                    clearInterval(timer);
                    result.innerHTML = "🎉 Countdown Finished!";
                }

                number--;
            }, 1000);
        }
    </script>

</body>
</html>
