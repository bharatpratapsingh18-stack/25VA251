<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        let myPromises=new Promise(function(resolve,reject){
            let age =25;
            if(age>=18){
                resolve("valid age");
            }
            else{
                reject("wait for next year");
            }
        });
        myPromises
        .then(result=>console.log(result))
        .catch(error=>console.log(error))
        .finally(console.log("Done"));

        //async await

        async function userData(){
            try{
                let response=await fetch('https://dummyjson.com/products');
            let responseData=await response.json();
            console.log(responseData);
            }
            catch(error){
                console.log(error);
            }
        }
        userData();

        // High order function
        //map:-
        let num=[3,4,5,6,7];
        let square=num.map(n=>n*2);
        console.log(square);

        //reduce:-
        let sum=num.reduce((total,n)=>total+n);
        console.log(sum);

        //filter
        let fil=num.filter((total,n)=>total+n);
        console.log(fil);

        let sorting=num.filter(n=>n>3);
        console.log(sorting);

        //for each
        let double=num.forEach(n=>n*2);
        console.log(double);

        num.forEach((n)=> console.log(n*2));

        //IIFE:-
        (function(){
            console.log("Modern JS");
        })();

        // short code for above code using arrow
        (meg=>console.log("Hello React"))();

        //Local storage:-

        let userInfo={
            name:'Bharat',
            age:18,
            mob:7906632993,
            email:"abcd@gmail.com"
        };
        //store object as a JSON string
        localStorage.setItem('userInfo',JSON.stringify(userInfo));

        //REtrieve the string and parse back into an object
        const saverUser=JSON.parse(localStorage.getItem('userInfo'));
        console.log(saverUser.name);//Output: Bharat

        


    </script>
</body>
</html>
