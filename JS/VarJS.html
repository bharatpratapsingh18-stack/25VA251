<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
</head>
<body>
    <script>
        //JS Variable Data value types

        //Proimitive : immutable single value and store in memory.

        //string===
        var myName="Bharat";
        console.log("my name is "+ myName);
        console.log(typeof(myName));

        //number
        var myMob=7906632993;
        console.log("my mobile no. is "+ myMob);
        console.log(typeof(myMob));

        //boolean
        var isMarried=true;
        console.log(myName + "is married ? " + isMarried);
        console.log(typeof(isMarried));

        //undefined
        var myAdd;
        console.log(myName + "address is " + myAdd);
        console.log(typeof(myAdd));

        //null
        var myEmail=null;
        console.log(myName + " e-mail address is " + myEmail);
        console.log(typeof(myEmail));

        //bigint
        var myValue=BigInt(2464859438594366382326957498);
        console.log(myValue);
        console.log(typeof(myValue));

        //symbol-unique primitive data value type in JS
        var val1=Symbol("Hello");
        var val2=Symbol("Hello");
        console.log(val1==val2);
        console.log(typeof(val1) + "and" + typeof(val2));

        

        //Reference or Non-primitive data value types============
        //Object {}-- value are defined in paird of key-value
        let myInfo={
            name:"Bharat",
            age:18 ,
            mob:7906632993,
            email:"bharatpratapsingh@gmail.com",
            isMarried:false,
            address:null,
            branch:"CSE",
            section:18
        };
        console.log(myInfo);
        //To find the lengh of object
        console.log(Object.keys(myInfo).length);
        console.log(myInfo.branch);

        //array - collection of any data type in JS
        let studentDetails=["Megha",
        24,
        false,
        "megha1990@gmail.com",
        "GZB"];
        console.log(studentDetails[2]);
        console.log(studentDetails.length);

        for(i=0;i<studentDetails.length;i++){
            console.log(studentDetails[i]);
        }
        //function - block of code i.e. perform particuler any task

        function myCal(){
            let num1=5;
            let num2=10;
            let result=num1+num2;
            console.log("Addition of two number is " + result);
        }
        myCal();



    </script>
    
</body>
</html>
